---
name: Deploy Docsify Wiki to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Github Pages Environment
              uses: actions/setup-pages@v6

            - name: Upload Static Artifacts
              uses: actions/upload-pages-artifact@v4
              with:
                  path: "."

            - name: Deploy to Github Pages Live
              id: deployment
              uses: actions/deploy-pages@v5
