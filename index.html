<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DevOps Journey | Documentation Wiki</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    <style>
        :root {
            --theme-color: #0070f3;
        }

        .sidebar-nav li strong {
            color: #111;
            font-size: 14px;
            margin-top: 12px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <div id="app">Loading Engineering Wiki...</div>
    <script>
        window.$docsify = {
            name: 'DevOps Journey <br/> Nitesh Dudhe',
            repo: 'nitesh-dudhe/devops-journey',
            loadSidebar: true,
            alias: { '/.*/_sidebar.md': '_sidebar.md' },

            basePath: window.location.origin.includes('github.io') ? '/devops-journey/' : '/',
            subMaxLevel: 0,
            auto2top: true,
            search: {
                maxAge: 86400000,
                paths: 'auto',
                placeholder: 'Search documentation...',
                noData: 'No matches found.',
                depth: 6
            },
            copyCode: { buttonText: 'Copy', errorText: 'Error', successText: 'Copied' }
        }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
    <!-- Syntax Parsers -->
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-hcl.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-docker.min.js"></script>
</body>

</html>
